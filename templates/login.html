<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataPortal — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050810; --card: #0d1117; --border: #1e2738; --border2: #252f42;
      --accent: #00f5c8; --accent2: #7b61ff; --danger: #ff4757;
      --text: #e8eaf0; --muted: #6b7280;
      --mono: 'Space Mono', monospace; --sans: 'Syne', sans-serif;
    }
    body {
      background: var(--bg); color: var(--text); font-family: var(--sans);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,245,200,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,200,.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    .box {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      padding: 48px 44px; width: 100%; max-width: 420px; position: relative; z-index: 1;
    }
    .eyebrow {
      font-family: var(--mono); font-size: 10px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--accent); margin-bottom: 10px;
    }
    .title { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; }
    .sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; }

    .message {
      padding: 12px 16px; border-radius: 10px; font-family: var(--mono);
      font-size: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }
    .message.success { background: rgba(0,245,200,.08); border: 1px solid rgba(0,245,200,.3); color: var(--accent); }
    .message.error { background: rgba(255,71,87,.08); border: 1px solid rgba(255,71,87,.3); color: var(--danger); }

    /* Google button */
    .google-btn {
      width: 100%; padding: 13px; background: #fff; color: #1f1f1f;
      border: none; border-radius: 10px; font-family: var(--sans); font-size: 14px;
      font-weight: 600; cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 10px; transition: all .2s; margin-bottom: 20px;
    }
    .google-btn:hover { background: #f0f0f0; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.3); }

    .divider {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-family: var(--mono); font-size: 10px; color: var(--muted); }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    input {
      width: 100%; background: var(--bg); border: 1px solid var(--border2);
      border-radius: 10px; padding: 13px 16px; color: var(--text);
      font-family: var(--mono); font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,245,200,.1); }
    input::placeholder { color: rgba(107,114,128,.5); }

    .submit-btn {
      width: 100%; padding: 14px; background: var(--accent); color: var(--bg);
      border: none; border-radius: 10px; font-family: var(--sans); font-size: 15px;
      font-weight: 700; cursor: pointer; transition: all .2s; margin-top: 4px;
    }
    .submit-btn:hover { background: #00ddb4; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,245,200,.25); }

    .footer { text-align: center; font-size: 13px; color: var(--muted); margin-top: 24px; }
    .footer a { color: var(--accent2); text-decoration: none; font-weight: 600; }
    .footer a:hover { text-decoration: underline; }
    .back { display: inline-block; font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; margin-bottom: 28px; transition: color .2s; }
    .back:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="box">
    <a href="/" class="back">← Back</a>
    <div class="eyebrow">Authentication</div>
    <div class="title">Welcome back.</div>
    <p class="sub">Sign in to access the data portal.</p>

    {% if message %}
    <div class="message {{ msg_type }}">
      <span>{{ '✓' if msg_type == 'success' else '✗' }}</span>
      <span>{{ message }}</span>
    </div>
    {% endif %}

    <!-- Google Sign-In -->
    <button class="google-btn" onclick="googleSignIn()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or sign in with email</span>
      <div class="divider-line"></div>
    </div>

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="your_username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="submit-btn">Sign In →</button>
    </form>

    <div class="footer">
      Don't have an account? <a href="/register">Create one →</a>
    </div>
  </div>

  <!-- Hidden Google One Tap div -->
  <div id="g_id_onload"
       data-client_id="{{ google_client_id }}"
       data-callback="handleGoogleCredential"
       data-auto_prompt="false">
  </div>

  <script>
    function googleSignIn() {
      google.accounts.id.initialize({
        client_id: "{{ google_client_id }}",
        callback: handleGoogleCredential
      });
      google.accounts.id.prompt();
    }

    function handleGoogleCredential(response) {
      fetch('/google-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ credential: response.credential })
      })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          window.location.href = '/dashboard';
        } else {
          alert('Google login failed: ' + (data.error || 'Unknown error'));
        }
      });
    }
  </script>
</body>
</html>
